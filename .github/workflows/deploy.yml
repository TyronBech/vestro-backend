name: Backend CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 12345
          POSTGRES_DB: vestro_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:12345@localhost:5432/vestro_test
      DIRECT_URL: postgresql://postgres:12345@localhost:5432/vestro_test
      JWT_SECRET: supersecretjwtsecretkeyfortesting12345
      SUPABASE_URL: https://dummy-supabase-url-for-testing.supabase.co
      SUPABASE_SERVICE_KEY: dummy-supabase-service-key-for-testing

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Push Prisma Schema
        run: npx prisma db push

      - name: Run Tests
        run: npm run test

      - name: Trigger Render Deploy
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success()
        run: |
          curl -f "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
